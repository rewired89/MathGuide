<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathGuide — Foundations to Bioinformatics</title>
  <meta name="description" content="Learn math the connected way. From number sense through calculus and linear algebra — built for Bioinformatics. Short, real, no fluff.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ── Header ── -->
  <header>
    <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
    <a class="logo" href="#" onclick="location.reload()">Math<span>Guide</span></a>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input
        type="search"
        id="search"
        placeholder="Search concepts — slope, probability, matrix..."
        autocomplete="off"
        spellcheck="false"
      >
    </div>
    <div class="header-right">
      <div class="progress-pill" id="progressPill">0/0 learned</div>
    </div>
  </header>

  <!-- ── Sidebar ── -->
  <div class="sidebar" id="sidebar" role="navigation" aria-label="Sections"></div>

  <!-- ── Main ── -->
  <main id="main" role="main"></main>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
